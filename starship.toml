# AUTO-GENERATED by scripts/build-theme.sh from theme.tokens.sh
add_newline = false
command_timeout = 200
format = "$directory$git_branch$git_status$python$conda$pixi$line_break$character"

palette = "onedark_flat"

[palettes.onedark_flat]
background = "#1f2329"
surface = "#161a20"
overlay = "#242a33"
text = "#c0c9d4"
text_strong = "#e2e8f0"
muted = "#97a1ae"
blue = "#61afef"
green = "#98c379"
yellow = "#e5c07b"
magenta = "#c678dd"
red = "#e06c75"
cyan = "#56b6c2"

[directory]
style = "bold fg:background bg:blue"
format = "[  $read_only$path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = false
read_only = "󰌾 "
read_only_style = "fg:red bg:blue"
repo_root_style = "bold fg:background bg:blue"
repo_root_format = "[  $read_only$repo_root$path ]($repo_root_style)"

[git_branch]
symbol = " "
style = "fg:text_strong bg:surface"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "fg:yellow bg:surface"
format = "[ $all_status$ahead_behind ]($style)"
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
conflicted = " "
up_to_date = ""
untracked = "? "
modified = "! "
stashed = "* "
staged = "+ "
renamed = "» "
deleted = "✕ "

[python]
symbol = " "
style = "fg:green bg:overlay"
format = "[ $symbol${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"
detect_extensions = []
detect_files = ["pyproject.toml", "requirements.txt", "Pipfile", "tox.ini", "setup.py"]

[conda]
symbol = " "
style = "fg:cyan bg:overlay"
format = "[ $symbol$environment ]($style)"

[pixi]
symbol = "󰏗 "
style = "fg:magenta"
format = "[ $symbol$environment ](fg:magenta bg:overlay)"

[line_break]
disabled = false

[character]
success_symbol = "[╰─❯](bold blue)"
error_symbol = "[╰─❯](bold red)"
vimcmd_symbol = "[╰─❮](bold yellow)"
