# AUTO-GENERATED by scripts/build-theme.sh from theme.tokens.sh

general {
    col.active_border = rgba(61afefee) rgba(56b6c2ee) 65deg
    col.inactive_border = rgba(3e4451ff)
}

decoration {
    rounding = 0

    shadow {
        enabled = true
        range = 12
        render_power = 6
        offset = 0 0
        ignore_window = false
        color = rgba(61afefee)
        color_inactive = rgba(5c637033)
    }
}

windowrule {
  name = windowrule-clear-default-opacity
  tag = -default-opacity
  match:class = .*
}

windowrule {
  name = windowrule-1
  opacity = 1.0 override 1.0 override # Window opacity control: force active/inactive windows fully opaque.
  match:class = .*
}

windowrule {
  name = windowrule-2
  no_dim = on
  opacity = 1.0 override 1.0 override # Window opacity control: override app defaults to fully opaque.
  match:class = (^brave-youtube\.com__-Default$)
}

windowrule {
  name = windowrule-gimp
  tag = -default-opacity
  no_dim = on
  opacity = 1.0 override 1.0 override 1.0 override # Window opacity control: force GIMP solid.
  match:class = ^gimp$
}

windowrule {
  name = windowrule-3
  no_dim = on
  opacity = 1.0 override 1.0 override # Window opacity control: force Netflix webapp solid.
  match:class = (^brave-www\.netflix\.com__browse-Default$)
}
