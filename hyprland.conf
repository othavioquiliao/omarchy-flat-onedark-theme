# AUTO-GENERATED by scripts/build-theme.sh from theme.tokens.sh

general {
    col.active_border = rgba(61afefdd) rgba(56b6c2dd) 65deg
    col.inactive_border = rgba(5c6370aa)
}

decoration {
    rounding = 0

    shadow {
        enabled = true
        range = 8
        render_power = 4
        offset = 0 0
        ignore_window = false
        color = rgba(61afef33)
        color_inactive = rgba(5c637022)
    }
}

# Remove default opacity tag from Omarchy defaults before global opacity rule applies.
windowrule = tag -default-opacity, match:class .*

# Window opacity control: keep active and inactive windows fully solid.
windowrule = opacity 1.0 override 1.0 override, match:class .*
